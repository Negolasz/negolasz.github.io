<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iWiW - Profil</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: "Tahoma", Arial, sans-serif; background: #f4f4f4; } </style>
</head>
<body>
  <header class="bg-gradient-to-r from-blue-800 to-blue-600 text-white py-3 px-6 flex justify-between">
    <div class="flex items-center gap-4">
      <div class="text-3xl font-bold">i<span class="text-yellow-300">wiw</span></div>
    </div>
    <nav class="flex gap-6 text-sm">
      <a href="index.html" class="hover:underline">Kezdőlap</a>
      <a href="profil.html" class="hover:underline font-bold">Profil</a>
      <a href="felhasznalok.html" class="hover:underline">Felhasználók</a>
      <a href="uzenetek.html" class="hover:underline">Üzenetek</a>
    </nav>
  </header>

  <div class="max-w-2xl mx-auto mt-10 bg-white p-8 border">
    <h1 class="text-2xl font-bold mb-6">Profil szerkesztése</h1>
    <input id="name" class="w-full border p-3 mb-4" placeholder="Név">
    <input id="city" class="w-full border p-3 mb-6" placeholder="Város">
    <button onclick="saveProfile()" class="bg-blue-700 text-white px-8 py-3">Mentés</button>
  </div>

  <script>
    function saveProfile() {
      const name = document.getElementById('name').value;
      const city = document.getElementById('city').value;
      if (name) {
        localStorage.setItem('currentUser', JSON.stringify({name, city}));
        alert("Profil elmentve!");
      }
    }
  </script>
</body>
</html>
