<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iWiW - Kezdőlap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: "Tahoma", Arial, sans-serif; background: #f4f4f4; }
    .iw-header { background: linear-gradient(to right, #003399, #0066cc); }
    .iw-nav { background: #003399; }
    .post { background: white; border: 1px solid #a0a0a0; }
  </style>
</head>
<body>
  <header class="iw-header text-white py-3 px-6 flex justify-between items-center">
    <div class="flex items-center gap-4">
      <div class="text-3xl font-bold">i<span class="text-yellow-300">wiw</span></div>
      <span class="text-sm">Hogyismint</span>
    </div>
    <nav class="flex gap-6 text-sm">
      <a href="index.html" class="hover:underline font-bold">Kezdőlap</a>
      <a href="profil.html" class="hover:underline">Profil</a>
      <a href="felhasznalok.html" class="hover:underline">Felhasználók</a>
      <a href="uzenetek.html" class="hover:underline">Üzenetek</a>
    </nav>
    <button onclick="logout()" class="text-sm hover:underline">Kijelentkezés</button>
  </header>

  <div class="max-w-6xl mx-auto p-6 flex gap-6">
    <div class="flex-1">
      <div class="bg-white border p-5 mb-6">
        <textarea id="postText" rows="3" class="w-full border p-4" placeholder="Mi jár a fejedben?"></textarea>
        <button onclick="publishPost()" class="mt-4 bg-blue-700 text-white px-8 py-2">Küldés</button>
      </div>
      <div id="feed" class="space-y-6"></div>
    </div>
  </div>

  <script>
    let posts = JSON.parse(localStorage.getItem('iw_posts')) || [];
    let currentUser = JSON.parse(localStorage.getItem('currentUser')) || {name: "Hogyismint"};

    function renderFeed() {
      document.getElementById('feed').innerHTML = posts.map(p => `
        <div class="post p-5">
          <strong>${p.user}</strong> <span class="text-gray-500 text-sm">${p.time}</span>
          <p class="mt-2">${p.content}</p>
        </div>
      `).join('');
    }

    function publishPost() {
      const text = document.getElementById('postText').value.trim();
      if (!text) return;
      posts.unshift({user: currentUser.name, time: "Most", content: text});
      localStorage.setItem('iw_posts', JSON.stringify(posts));
      document.getElementById('postText').value = '';
      renderFeed();
    }

    renderFeed();
    function logout() { localStorage.clear(); location.reload(); }
  </script>
</body>
</html>
